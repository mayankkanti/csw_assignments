<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}My Blog{% endblock %}</title>
</head>
<body>
  <h1>My Blog</h1>
  {% load blog_tags %}
  <div style="display:flex; gap:12px;">
    <div>
      <h2>Sidebar</h2>
      <p>Total posts: {% total_posts %}</p>
      {% latest_posts 5 %}
      {% most_commented 5 %}
    </div>
    <div>{% block content %}{% endblock %}</div>

  </div>
</body>
</html>
