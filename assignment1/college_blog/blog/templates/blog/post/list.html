{% extends "blog/base.html" %}
{% block title %}Blog Posts{% endblock %}
{% block content %}
  <h2>Blog Posts</h2>
  {% for post in posts %}
    <div>
      <h3><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h3>
      <p>By {{ post.author }} | {{ post.publish }}</p>
      <p>{{ post.body|truncatewords:30 }}</p>
    </div>
  {% endfor %}
{% endblock %}
